<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Jewelry</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; color: #333; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: #000;
      color: #fff;
    }

    header h1 { font-size: 24px; }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      height: 90vh;
      background: url('https://images.unsplash.com/photo-1602751584552-8ba73aad10e1') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
    }

    .hero h2 { font-size: 48px; margin-bottom: 10px; }
    .hero p { font-size: 18px; margin-bottom: 20px; }

    .btn {
      padding: 12px 25px;
      background: gold;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .products {
      padding: 50px;
      text-align: center;
    }

    .products h2 { margin-bottom: 30px; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover { transform: scale(1.05); }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 { margin: 10px 0; }

    footer {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Luxury Jewels</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Collection</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Elegance Redefined</h2>
    <p>Discover timeless jewelry crafted with perfection</p>
    <button class="btn">Shop Now</button>
  </div>
</section>

<section class="products">
  <h2>Featured Collection</h2>
  <div class="product-grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
      <h3>Gold Necklace</h3>
      <p>₹25,000</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
      <h3>Diamond Ring</h3>
      <p>₹45,000</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600180758890-6f02f69cb52c">
      <h3>Silver Bracelet</h3>
      <p>₹10,000</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Luxury Jewels. All Rights Reserved.</p>
</footer>

</body>
</html>
